# EK-RA8P1 Board Configuration
# EK-RA8P1 板级配置
#
# 基于 Zephyr 的 ek_ra8p1 板级配置移植

chip = "ra8"

[board]
name = "ek-ra8p1"
vendor = "renesas"
family = "ra8"
mcu = "ra8p1"

[pinout]
led1 = "P100"
dbg_uart_tx = "P101"
dbg_uart_rx = "P102"
spi1_sck = "P200"
spi1_miso = "P201"
spi1_mosi = "P202"
i2c1_scl = "P300"
i2c1_sda = "P301"
