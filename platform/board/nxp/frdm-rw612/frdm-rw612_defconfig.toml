# FRDM-RW612 Board Configuration
# FRDM-RW612 板级配置
#
# 基于 Zephyr 的 frdm_rw612 板级配置移植

chip = "rw612"

[board]
name = "frdm-rw612"
vendor = "nxp"
family = "rw612"
mcu = "rw612"

[pinout]
led1 = "PIO0_8"
dbg_uart_tx = "PIO0_0"
dbg_uart_rx = "PIO0_1"
spi1_sck = "PIO0_14"
spi1_miso = "PIO0_15"
spi1_mosi = "PIO0_16"
i2c1_scl = "PIO0_10"
i2c1_sda = "PIO0_11"
