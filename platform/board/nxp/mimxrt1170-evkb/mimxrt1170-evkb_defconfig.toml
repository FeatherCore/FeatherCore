# MIMXRT1170-EVKB Board Configuration
# MIMXRT1170-EVKB 板级配置
#
# 基于 Zephyr 的 mimxrt1170_evk 板级配置移植

chip = "imxrt1170"

[board]
name = "mimxrt1170-evkb"
vendor = "nxp"
family = "mimxrt1170"
mcu = "mimxrt1176dvm"

[pinout]
led1 = "GPIO_AD_09"
dbg_uart_tx = "GPIO_AD_01"
dbg_uart_rx = "GPIO_AD_02"
spi1_sck = "GPIO_AD_26"
spi1_miso = "GPIO_AD_27"
spi1_mosi = "GPIO_AD_28"
i2c1_scl = "GPIO_AD_14"
i2c1_sda = "GPIO_AD_15"
