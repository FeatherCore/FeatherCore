# ESP32-C6-DevKitM Board Configuration
# ESP32-C6-DevKitM 板级配置
#
# 基于 Zephyr 的 esp32c6_devkitm 板级配置移植

chip = "esp32c6"

[board]
name = "esp32-c6-devkitm"
vendor = "espressif"
family = "esp32-c6"
mcu = "esp32-c6"

[pinout]
led1 = "GPIO8"
dbg_uart_tx = "GPIO21"
dbg_uart_rx = "GPIO20"
spi1_sck = "GPIO6"
spi1_miso = "GPIO7"
spi1_mosi = "GPIO8"
i2c1_scl = "GPIO10"
i2c1_sda = "GPIO11"
