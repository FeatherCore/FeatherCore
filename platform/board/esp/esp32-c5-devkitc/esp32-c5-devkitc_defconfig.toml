# ESP32-C5-DevKitC Board Configuration
# ESP32-C5-DevKitC 板级配置

chip = "esp32c5"

[board]
name = "esp32-c5-devkitc"
vendor = "espressif"
family = "esp32-c5"
mcu = "esp32-c5"

[pinout]
led1 = "GPIO8"
dbg_uart_tx = "GPIO21"
dbg_uart_rx = "GPIO20"
spi1_sck = "GPIO6"
spi1_miso = "GPIO7"
spi1_mosi = "GPIO8"
i2c1_scl = "GPIO10"
i2c1_sda = "GPIO11"
