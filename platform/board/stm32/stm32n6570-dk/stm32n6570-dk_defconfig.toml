# STM32N6570-DK Board Configuration
# STM32N6570-DK 板级配置
#
# 高性能 Arm Cortex-M55 with Helium and Ethos-U55 NPU

chip = "stm32n6"

[board]
name = "stm32n6570-dk"
vendor = "st"
family = "stm32n6"
mcu = "stm32n6570"

[chip_extra]
fpu_dp = true
helium = true
mve = true

[cache]
icache = true
dcache = true

[npu]
ethos_u55 = true
macs_per_clock = 512

[gpu]
enabled = true

[dma2d]
enabled = true

[jpeg]
enabled = true

[security]
tfm = true
crypto_aes = true
crypto_sha = true

[serial]
console_uart = 1
baudrate = 115200
num_uart = 4

[peripherals]
gpio_num = 112
i2c_num = 4
spi_num = 4
can_num = 2
can_fd = true
usb_otg = true
usb_device = true
usb_hs = true
sdmmc = true
octospi = true
hyperbus = true
dma_num = 2
adc_num = 2
dac_num = 2
crc_hw = true
rng_hw = true
iwdg = true
swd = true
