# STM32H7S78-DK Board Configuration
# STM32H7S78-DK 板级配置
#
# 基于 Zephyr 的 stm32h7s78_dk 板级配置移植

chip = "stm32h7rs"

[board]
name = "stm32h7s78-dk"
full_name = "STMicroelectronics STM32H7S78 Discovery Kit"
vendor = "st"
family = "stm32h7"
mcu = "stm32h7s78"

[supported]
arduino_gpio = true
gpio = true
uart = true
watchdog = true
entropy = true
adc = true
octospi = true
usbd = true
memc = true

[config]
arm_mpu = true
hw_stack_protection = true
serial = true
console = true
uart_console = true

[pinout]
led1 = "PD13"
user_button = "PC13"
dbg_uart_tx = "PG7"
dbg_uart_rx = "PG8"
octospi1_io0 = "PD11"
octospi1_io1 = "PD12"
octospi1_io2 = "PD13"
octospi1_io3 = "PD4"
octospi1_io4 = "PD5"
octospi1_io5 = "PD6"
octospi1_io6 = "PG9"
octospi1_io7 = "PG10"
octospi1_sck = "PD10"
octospi1_ncs = "PG12"
i2c4_scl = "PF14"
i2c4_sda = "PF15"
