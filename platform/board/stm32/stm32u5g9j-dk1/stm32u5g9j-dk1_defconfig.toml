# STM32U5G9J-DK1 Board Configuration
# STM32U5G9J-DK1 板级配置
#
# 与 STM32U5A9J-DK 相同的配置，主控型号不同

chip = "stm32u5"

[board]
name = "stm32u5g9j-dk1"
vendor = "st"
family = "stm32u5"
mcu = "stm32u5g9j"

[pinout]
led1 = "PD13"
dbg_uart_tx = "PA2"
dbg_uart_rx = "PA3"
spi1_sck = "PA5"
spi1_miso = "PA6"
spi1_mosi = "PA7"
i2c1_scl = "PB8"
i2c1_sda = "PB9"
