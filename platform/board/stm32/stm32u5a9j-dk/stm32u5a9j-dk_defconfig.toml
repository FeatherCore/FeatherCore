# STM32U5A9J-DK Board Configuration
# STM32U5A9J-DK 板级配置
#
# 基于 Zephyr 的 stm32u5a9j_dk 板级配置移植

chip = "stm32u5"

[board]
name = "stm32u5a9j-dk"
vendor = "st"
family = "stm32u5"
mcu = "stm32u5a9j"

[pinout]
led1 = "PE0"
led2 = "PE1"
dbg_uart_tx = "PA2"
dbg_uart_rx = "PA3"
spi1_sck = "PA5"
spi1_miso = "PA6"
spi1_mosi = "PA7"
i2c1_scl = "PB8"
i2c1_sda = "PB9"
