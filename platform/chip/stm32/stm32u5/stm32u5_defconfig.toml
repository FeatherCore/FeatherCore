# STM32U5 Series Chip Configuration
# STM32U5 系列芯片通用配置

[chip]
name = "stm32u5"
vendor = "stmicroelectronics"
full_name = "STMicroelectronics STM32U5 Series"

[cpu]
core = "cortex-m33"
frequency = 160000000
fpu = true

[memory]
flash_base = 0x08000000
flash_size = 2097152  # 2MB default

sram_base = 0x20000000
sram_size = 768 * 1024  # 768KB default

[bootloader]
boot_base_address = 0x08000000
boot_size = 0x10000  # 64KB default
boot_stack_size = 0x2000  # 8KB default

[kernel]
kernel_base_address = 0x08010000
kernel_size = 0x1F0000  # 1.9375MB default
kernel_stack_size = 0x4000  # 16KB default
kernel_heap_size = 0x20000  # 128KB default
